version: 2

models:
  - name: dim_position
    description: "SCT Type 2 position master records"
    columns:
      - name: position_sk
        tests:
          - unique
          - not_null
      - name: position_id
        test:
          - not_null
    tests:
      - dbt_utils.expression_is_true:
          expression: "effective_start_date <= effective_end_date"

  - name: dim_employee
    description: "SCD Type 2 employee master records"
    columns:
      - name: employee_sk
        tests:
          - unique
          - not_null
      - name: employee_id
        tests:
          - not_null
    tests:
      - dbt_utils.expression_is_true:
          expression: "effective_start_date <= effective_end_date"

  - name: fact_position_occupancy_event
    description: "Append-only event log for position changes"
    columns:
      - name: event_id
        tests:
          - unique
          - not_null
  
  - name: bridge_position_occupancy
    description: "Many-to-many position occupancy with overlap tracking"
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - position_sk
            - employee_sk
            - assignment_start

